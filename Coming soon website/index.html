<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>DroneStudio — Coming Soon</title>
<link rel="icon" type="image/png" href="Light_LightBG.png" >
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Serif+Display:ital@1&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:        #f5f2ee;
    --surface:   #ede9e3;
    --line:      #d4cfc8;
    --ink:       #111110;
    --ink-muted: #6b6860;
    --accent:    #d44b1e;
    --accent-2:  #f0a500;
    --white:     #ffffff;

    --f-display: 'Bebas Neue', sans-serif;
    --f-serif:   'DM Serif Display', serif;
    --f-body:    'DM Sans', sans-serif;
  }

  html, body { height: 100%; }

  body {
    font-family: var(--f-body);
    background: var(--bg);
    color: var(--ink);
    overflow-x: hidden;
    min-height: 100svh;
    display: flex;
    flex-direction: column;
  }

  ::selection { background: var(--accent); color: var(--white); }

  .bg {
    position: fixed;
    inset: 0;
    z-index: -1;
    background:
      radial-gradient(ellipse 80% 60% at 70% 40%, rgba(212,75,30,0.07) 0%, transparent 60%),
      radial-gradient(ellipse 50% 50% at 20% 80%, rgba(240,165,0,0.06) 0%, transparent 50%);
  }

  .bg::before {
    content: '';
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(var(--line) 1px, transparent 1px),
      linear-gradient(90deg, var(--line) 1px, transparent 1px);
    background-size: 60px 60px;
    opacity: 0.35;
  }

  .top {
    width: 100%;
    padding: 2rem clamp(1.5rem, 5vw, 4rem);
  }

  .logo {
    font-family: var(--f-display);
    font-size: 1.7rem;
    letter-spacing: 0.08em;
    display: inline-flex;
    align-items: center;
    gap: 0.5rem;
    text-decoration: none;
    color: var(--ink);
  }

  .logo .dot {
    width: 9px; height: 9px;
    background: var(--accent);
    border-radius: 50%;
    display: inline-block;
    margin-bottom: 2px;
  }

  main {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 2rem clamp(1.5rem, 5vw, 4rem);
  }

  .content {
    max-width: 760px;
    text-align: center;
  }

  .label {
    display: inline-flex;
    align-items: center;
    gap: 0.6rem;
    font-size: 0.75rem;
    font-weight: 500;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 1.8rem;
    animation: fadeUp 0.6s ease both;
    justify-content: center;
  }

  .label::before, .label::after {
    content: '';
    width: 32px; height: 1.5px;
    background: var(--accent);
  }

  h1 {
    font-family: var(--f-display);
    font-size: clamp(3.5rem, 14vw, 9rem);
    line-height: 0.95;
    letter-spacing: 0.02em;
    color: var(--ink);
    animation: fadeUp 0.6s 0.1s ease both;
  }

  h1 em {
    font-family: var(--f-serif);
    font-style: italic;
    color: var(--accent);
    font-size: 0.75em;
    letter-spacing: 0;
  }

  .sub {
    max-width: 480px;
    margin: 2rem auto 0;
    font-size: 1.05rem;
    line-height: 1.7;
    color: var(--ink-muted);
    animation: fadeUp 0.6s 0.2s ease both;
  }

  /* Countdown */
  .countdown {
    display: flex;
    justify-content: center;
    gap: clamp(1rem, 3vw, 2rem);
    margin-top: 3rem;
    animation: fadeUp 0.6s 0.3s ease both;
  }

  .countdown-item {
    min-width: 80px;
  }

  .countdown-num {
    font-family: var(--f-display);
    font-size: clamp(2.2rem, 6vw, 3.5rem);
    letter-spacing: 0.03em;
    color: var(--ink);
    line-height: 1;
  }

  .countdown-label {
    font-size: 0.72rem;
    font-weight: 500;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--ink-muted);
    margin-top: 0.5rem;
  }

  /* Email form */
  .notify {
    margin-top: 3rem;
    display: flex;
    gap: 0.75rem;
    justify-content: center;
    flex-wrap: wrap;
    animation: fadeUp 0.6s 0.4s ease both;
  }

  .notify input {
    background: var(--white);
    border: 1.5px solid var(--line);
    border-radius: 2px;
    padding: 0.95rem 1.2rem;
    font-family: var(--f-body);
    font-size: 0.92rem;
    color: var(--ink);
    outline: none;
    transition: border-color 0.2s;
    width: 320px;
    max-width: 100%;
  }

  .notify input:focus { border-color: var(--accent); }

  .notify button {
    display: inline-flex;
    align-items: center;
    gap: 0.6rem;
    background: var(--ink);
    color: var(--white);
    border: none;
    font-family: var(--f-body);
    font-size: 0.85rem;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 1rem 2rem;
    border-radius: 2px;
    cursor: pointer;
    transition: background 0.2s, transform 0.2s;
  }

  .notify button:hover { background: var(--accent); transform: translateY(-2px); }

  .form-msg {
    margin-top: 1rem;
    font-size: 0.85rem;
    color: var(--accent);
    min-height: 1.2em;
    animation: fadeUp 0.6s 0.4s ease both;
  }

  /* Footer */
  footer {
    padding: 2.5rem clamp(1.5rem, 5vw, 4rem);
    border-top: 1px solid var(--line);
  }

  .footer-inner {
    max-width: 1320px;
    margin: 0 auto;
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 1.5rem;
  }

  .footer-inner p {
    font-size: 0.8rem;
    color: var(--ink-muted);
  }

  .socials {
    display: flex;
    gap: 1.2rem;
  }

  .socials a {
    color: var(--ink-muted);
    transition: color 0.2s;
    display: flex;
  }

  .socials a:hover { color: var(--accent); }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(28px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  @media (max-width: 600px) {
    .countdown { gap: 1rem; }
    .countdown-item { min-width: 60px; }
    .notify { flex-direction: column; align-items: center; }
    .notify input, .notify button { width: 100%; max-width: 320px; justify-content: center; }
  }
</style>
</head>
<body>

  <div class="bg"></div>

  <div class="top">
    <a href="#" class="nav-logo">
      <img src="Light_Logo_Transparent.png" alt="DroneStudio" style="height: 100px; width: autopx;">
    </a>
  </div>

  <main>
    <div class="content">
      <div class="label">Aerial Videography &amp; Photography</div>
      <h1>SOMETHING NEW<br>IS TAKING <em>Flight.</em></h1>
      <p class="sub">
        We're putting the finishing touches on our new online home. Cinematic aerial footage stunning photography — landing soon.
      </p>

      <div class="countdown" id="countdown">
        <div class="countdown-item">
          <div class="countdown-num" id="cd-days">00</div>
          <div class="countdown-label">Days</div>
        </div>
        <div class="countdown-item">
          <div class="countdown-num" id="cd-hours">00</div>
          <div class="countdown-label">Hours</div>
        </div>
        <div class="countdown-item">
          <div class="countdown-num" id="cd-mins">00</div>
          <div class="countdown-label">Minutes</div>
        </div>
        <div class="countdown-item">
          <div class="countdown-num" id="cd-secs">00</div>
          <div class="countdown-label">Seconds</div>
        </div>
      </div>

      <form class="notify" id="notifyForm" action="https://formsubmit.co/info@dronestudio.au" method="POST">
        <input type="email" name="email" placeholder="Your email address" required />
        <button type="submit">
          Notify Me
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
        </button>
      </form>
      <div class="form-msg" id="formMsg"></div>
    </div>
  </main>

  <footer>
    <div class="footer-inner">
      <p>© 2025 DroneStudio. All rights reserved. Brisbane, QLD, Australia.</p>
      <div class="socials">
        <a href="https://www.instagram.com/dronestudio.au/" aria-label="Instagram">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="2" width="20" height="20" rx="5"/><circle cx="12" cy="12" r="4"/><circle cx="17.5" cy="6.5" r="1"/></svg>
        </a>
        <a href="https://www.tiktok.com/@dronestudio.au" aria-label="TikTok">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M16 4c.5 2.5 2 4 4.5 4.3v2.3c-1.6 0-3.1-.5-4.5-1.4v5.6a4.8 4.8 0 11-4.8-4.8c.3 0 .6 0 .9.1v2.3a2.5 2.5 0 102 2.4V2h2v2z"/></svg>
        </a>
        <a href="https://www.youtube.com/@DroneStudioAu" aria-label="YouTube">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 8.4c0-1.7-1.4-3.1-3.1-3.3C16.6 5 12 5 12 5s-4.6 0-6.9.1C3.4 5.3 2 6.7 2 8.4v7.2c0 1.7 1.4 3.1 3.1 3.3 2.3.1 6.9.1 6.9.1s4.6 0 6.9-.1c1.7-.2 3.1-1.6 3.1-3.3V8.4z"/><path d="M10 9.5l5 2.5-5 2.5z"/></svg>
        </a>
        <a href="https://x.com/DroneStudioAu" aria-label="X">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M18 2h3l-7.5 8.6L22 22h-6.6l-5.2-6.8L4 22H1l8-9.2L2 2h6.8l4.7 6.2z"/></svg>
        </a>
      </div>
    </div>
  </footer>

  <script>
    // Set this to your launch date (YYYY-MM-DD or with time)
    const launchDate = new Date('2027-08-01T00:00:00').getTime();

    function updateCountdown() {
      const now = new Date().getTime();
      let diff = launchDate - now;
      if (diff < 0) diff = 0;

      const days = Math.floor(diff / (1000 * 60 * 60 * 24));
      const hours = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
      const mins = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
      const secs = Math.floor((diff % (1000 * 60)) / 1000);

      document.getElementById('cd-days').textContent = String(days).padStart(2, '0');
      document.getElementById('cd-hours').textContent = String(hours).padStart(2, '0');
      document.getElementById('cd-mins').textContent = String(mins).padStart(2, '0');
      document.getElementById('cd-secs').textContent = String(secs).padStart(2, '0');
    }
    updateCountdown();
    setInterval(updateCountdown, 1000);

    // Friendly inline message on submit (FormSubmit will still redirect/handle the actual send)
    document.getElementById('notifyForm').addEventListener('submit', function () {
      document.getElementById('formMsg').textContent = "Thanks — we'll let you know when we launch!";
    });
  </script>

</body>
</html>
